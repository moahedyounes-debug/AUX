<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Spare Parts System</title>

<style>
    body { font-family: Arial, sans-serif; background:#f5f7fa; padding:40px; }
    .card { max-width:400px; margin:60px auto; background:#fff; padding:25px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    h1 { text-align:center; color:#0b3c6f; }
    label { display:block; margin-top:15px; }
    input { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; }
    button { margin-top:20px; width:100%; padding:10px; background:#0b3c6f; color:#fff; border:none; border-radius:6px; cursor:pointer; }
    button:hover { background:#09406f; }
    .error { color:#c00; margin-top:10px; text-align:center; }
    .loader {
        display:none;
        margin:10px auto;
        border:4px solid #f3f3f3;
        border-top:4px solid #0b3c6f;
        border-radius:50%;
        width:30px;
        height:30px;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>

<body>

<div class="card" id="step1">
    <h1>Spare Parts System</h1>

    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com">

    <button onclick="sendCode()">Send Verification Code</button>

    <div class="loader" id="loader1"></div>
    <div id="error1" class="error"></div>
</div>

<div class="card" id="step2" style="display:none;">
    <h1>Enter Verification Code</h1>

    <label>Verification Code</label>
    <input type="text" id="code" placeholder="6-digit code">

    <button onclick="verifyCode()">Verify & Login</button>

    <div class="loader" id="loader2"></div>
    <div id="error2" class="error"></div>
</div>

<script src="config.js"></script>

<script>
let generatedCode = null;
let userEmail = null;

// STEP 1 — Send Code
function sendCode() {
    const email = document.getElementById("email").value.trim();
    const errorDiv = document.getElementById("error1");
    const loader = document.getElementById("loader1");

    errorDiv.textContent = "";
    if (!email) {
        errorDiv.textContent = "Please enter your email.";
        return;
    }

    loader.style.display = "block";

    fetch(API_URL + "?action=getUser&email=" + encodeURIComponent(email))
        .then(res => res.json())
        .then(user => {
            loader.style.display = "none";

            if (!user.exists) {
                errorDiv.textContent = "Access denied. Email not registered.";
                return;
            }

            // Generate 6-digit code
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            userEmail = email;

            // Send code via backend
            fetch(API_URL + "?action=sendLoginCode", {
                method: "POST",
                body: JSON.stringify({
                    email: email,
                    code: generatedCode
                })
            });

            // Move to step 2
            document.getElementById("step1").style.display = "none";
            document.getElementById("step2").style.display = "block";
        })
        .catch(err => {
            loader.style.display = "none";
            errorDiv.textContent = "Error connecting to server.";
        });
}

// STEP 2 — Verify Code
function verifyCode() {
    const code = document.getElementById("code").value.trim();
    const errorDiv = document.getElementById("error2");
    const loader = document.getElementById("loader2");

    errorDiv.textContent = "";

    if (!code) {
        errorDiv.textContent = "Please enter the verification code.";
        return;
    }

    loader.style.display = "block";

    setTimeout(() => {
        loader.style.display = "none";

        if (code !== generatedCode) {
            errorDiv.textContent = "Incorrect code.";
            return;
        }

        // Fetch user info again
        fetch(API_URL + "?action=getUser&email=" + encodeURIComponent(userEmail))
            .then(res => res.json())
            .then(user => {
                localStorage.setItem("sp_user", JSON.stringify(user));

                if (user.role === "requester") {
                    window.location.href = "create-request.html";
                } else {
                    window.location.href = "dashboard.html";
                }
            });
    }, 1000);
}
</script>

</body>
</html>
