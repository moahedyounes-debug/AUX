<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Details - Spare Parts </title>

<style>
    body { font-family: Arial, sans-serif; background:#f5f7fa; padding:20px; }
    h1 { color:#0b3c6f; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }

    .card {
        background:#fff;
        padding:20px;
        border-radius:8px;
        box-shadow:0 2px 8px rgba(0,0,0,0.1);
        max-width:700px;
        margin:auto;
    }

    .row { margin-bottom:12px; }
    .label { font-weight:bold; }

    textarea {
        width:100%;
        padding:10px;
        border-radius:6px;
        border:1px solid #ccc;
        margin-top:5px;
    }

    button {
        margin-top:10px;
        padding:10px 18px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-size:0.9rem;
    }

    .approve { background:#28a745; color:#fff; }
    .reject { background:#dc3545; color:#fff; }
    .update { background:#0b3c6f; color:#fff; }

    select {
        width:100%;
        padding:10px;
        border-radius:6px;
        border:1px solid #ccc;
        margin-top:5px;
    }

    .link { color:#0b3c6f; text-decoration:none; font-size:0.9rem; }
</style>
</head>

<body>

<div class="top-bar">
    <h1>Request Details</h1>
    <div>
        <a href="dashboard.html" class="link">Back to Dashboard</a> |
        <span id="userInfo"></span> |
        <a href="#" class="link" onclick="logout()">Logout</a>
    </div>
</div>

<div class="card">

    <div class="row"><span class="label">PO:</span> <span id="po"></span></div>
    <div class="row"><span class="label">Part:</span> <span id="part"></span></div>
    <div class="row"><span class="label">Quantity:</span> <span id="qty"></span></div>
    <div class="row"><span class="label">Part Number:</span> <span id="partNumber"></span></div>
    <div class="row"><span class="label">Reason:</span> <span id="reason"></span></div>
    <div class="row"><span class="label">Date:</span> <span id="date"></span></div>
    <div class="row"><span class="label">Requester:</span> <span id="requester"></span></div>
    <div class="row"><span class="label">Status:</span> <span id="status"></span></div>
    <div class="row"><span class="label">Reviewer Comment:</span> <span id="reviewerComment"></span></div>

    <!-- REVIEWER SECTION -->
    <div id="reviewSection" style="margin-top:20px; display:none;">
        <h3>Reviewer Approval</h3>
        <label>Comment</label>
        <textarea id="commentReviewer" rows="3"></textarea>
        <button class="approve" onclick="updateStatus('Under Review')">Approve (Initial)</button>
        <button class="reject" onclick="updateStatus('Rejected')">Reject</button>
    </div>

    <!-- MANAGER SECTION -->
    <div id="managerSection" style="margin-top:20px; display:none;">
        <h3>Manager Final Approval</h3>

        <label>Update Status</label>
        <select id="managerStatus">
            <option value="Approved">Approved</option>
            <option value="Under Process">Under Process</option>
            <option value="Shipped">Shipped</option>
            <option value="Delivered">Delivered</option>
        </select>

        <label>Comment</label>
        <textarea id="commentManager" rows="3"></textarea>

        <button class="update" onclick="updateManagerStatus()">Update Status</button>
    </div>

</div>

<script src="config.js"></script>

<script>
let currentUser = null;
let currentId = null;

// Load user
function loadUser() {
    currentUser = getCurrentUser();
    if (!currentUser) window.location.href = "login.html";

    document.getElementById("userInfo").textContent =
        currentUser.name + " (" + currentUser.role + ")";
}

// Get ID from URL
function getQueryParam(name) {
    const url = new URL(window.location.href);
    return url.searchParams.get(name);
}

// Load request details
function loadRequest() {
    currentId = getQueryParam("id");
    if (!currentId) {
        alert("No request ID.");
        window.location.href = "dashboard.html";
        return;
    }

    fetch(API_URL + "?action=getRequest&id=" + encodeURIComponent(currentId))
        .then(res => res.json())
        .then(r => {
            if (r.error) {
                alert("Request not found.");
                window.location.href = "dashboard.html";
                return;
            }

            document.getElementById("po").textContent = r.po;
            document.getElementById("part").textContent = r.part;
            document.getElementById("qty").textContent = r.qty;
            document.getElementById("partNumber").textContent = r.partNumber || "-";
            document.getElementById("reason").textContent = r.reason;
            document.getElementById("date").textContent = r.date;
            document.getElementById("requester").textContent = r.requesterName + " (" + r.requesterEmail + ")";
            document.getElementById("status").textContent = r.status;
            document.getElementById("reviewerComment").textContent = r.reviewerComment || "-";

            // Reviewer permissions
            if (currentUser.role === "reviewer") {
                document.getElementById("reviewSection").style.display = "block";
                document.getElementById("commentReviewer").value = r.reviewerComment || "";
            }

            // Manager permissions
            if (currentUser.role === "manager") {
                document.getElementById("managerSection").style.display = "block";
                document.getElementById("commentManager").value = r.reviewerComment || "";
            }
        });
}

// Reviewer update
function updateStatus(newStatus) {
    const comment = document.getElementById("commentReviewer").value;

    const payload = {
        id: currentId,
        status: newStatus,
        reviewerComment: comment
    };

    fetch(API_URL + "?action=updateRequestStatus", {
        method: "POST",
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(res => {
        if (res.success) {
            alert("Status updated.");
            window.location.reload();
        } else {
            alert("Error updating status.");
        }
    });
}

// Manager update
function updateManagerStatus() {
    const newStatus = document.getElementById("managerStatus").value;
    const comment = document.getElementById("commentManager").value;

    const payload = {
        id: currentId,
        status: newStatus,
        reviewerComment: comment
    };

    fetch(API_URL + "?action=updateRequestStatus", {
        method: "POST",
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(res => {
        if (res.success) {
            alert("Status updated.");
            window.location.reload();
        } else {
            alert("Error updating status.");
        }
    });
}

loadUser();
loadRequest();
</script>

</body>
</html>
