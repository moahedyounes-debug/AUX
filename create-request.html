<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Request - Spare Parts</title>
<style>
    body { font-family: Arial, sans-serif; background:#f5f7fa; padding:20px; }
    h1 { color:#0b3c6f; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .card { max-width:600px; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    label { display:block; margin-top:10px; }
    input, textarea { width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; }
    button { margin-top:20px; padding:10px 20px; background:#0b3c6f; color:#fff; border:none; border-radius:6px; cursor:pointer; }
    button:hover { background:#09406f; }
    .link { color:#0b3c6f; text-decoration:none; font-size:0.9rem; }
</style>
</head>
<body>

<div class="top-bar">
    <h1>Create Spare Parts Request</h1>
    <div>
        <span id="userInfo"></span> |
        <a href="dashboard.html" class="link">Dashboard</a> |
        <a href="login.html" class="link" onclick="logout()">Logout</a>
    </div>
</div>

<div class="card">
    <label>Part Name</label>
    <input type="text" id="part" required>

    <label>Quantity</label>
    <input type="number" id="qty" required>

    <label>Reason</label>
    <textarea id="reason" rows="4" required></textarea>

    <button onclick="submitRequest()">Submit Request</button>
</div>

<script>
const API_URL = "YOUR_WEB_APP_URL";

let currentUser = null;

function loadUser() {
    const u = localStorage.getItem("sp_user");
    if (!u) {
        window.location.href = "login.html";
        return;
    }
    currentUser = JSON.parse(u);
    document.getElementById("userInfo").textContent =
        currentUser.name + " (" + currentUser.role + ")";
    if (currentUser.role !== "requester" && currentUser.role !== "manager") {
        // حتى لو كان reviewer يقدر يرفع؟ هنا خليه فقط requester/manager
        alert("You are not allowed to create requests.");
        window.location.href = "dashboard.html";
    }
}

function submitRequest() {
    const part = document.getElementById("part").value.trim();
    const qty = document.getElementById("qty").value.trim();
    const reason = document.getElementById("reason").value.trim();

    if (!part || !qty || !reason) {
        alert("Please fill all fields.");
        return;
    }

    const payload = {
        po: "PO-" + Date.now(),
        part: part,
        qty: qty,
        reason: reason,
        date: new Date().toISOString().split("T")[0],
        requesterEmail: currentUser.email,
        requesterName: currentUser.name
    };

    fetch(API_URL + "?action=addRequest", {
        method: "POST",
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(res => {
        if (res.success) {
            alert("Request submitted successfully.");
            window.location.href = "dashboard.html";
        } else {
            alert("Error submitting request.");
        }
    })
    .catch(err => {
        console.error(err);
        alert("Error connecting to server.");
    });
}

function logout() {
    localStorage.removeItem("sp_user");
}

loadUser();
</script>

</body>
</html>
