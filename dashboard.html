<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Spare Parts Requests</title>
<style>
    body { font-family: Arial, sans-serif; background:#f5f7fa; padding:20px; }
    h1 { color:#0b3c6f; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    th, td { padding:10px 12px; border-bottom:1px solid #ddd; text-align:left; }
    th { background:#0b3c6f; color:#fff; }
    tr:hover { background:#f1f5ff; }
    .status { padding:4px 8px; border-radius:6px; color:#fff; font-size:0.8rem; }
    .New { background:#007bff; }
    .Approved { background:#28a745; }
    .Rejected { background:#dc3545; }
    .UnderReview { background:#ffc107; color:#222; }
    .link { color:#0b3c6f; text-decoration:none; font-size:0.9rem; }
    #searchBox { padding:8px; width:250px; border-radius:6px; border:1px solid #ccc; }
</style>
</head>
<body>

<div class="top-bar">
    <h1>Spare Parts Requests</h1>
    <div>
        <input type="text" id="searchBox" placeholder="Search..." onkeyup="filterTable()">
        |
        <a href="create-request.html" class="link">New Request</a> |
        <span id="userInfo"></span> |
        <a href="#" class="link" onclick="logout()">Logout</a>
    </div>
</div>

<table id="partsTable">
    <thead>
        <tr>
            <th>PO</th>
            <th>Part</th>
            <th>Qty</th>
            <th>Status</th>
            <th>Date</th>
            <th>Requester</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- ربط ملف الإعدادات -->
<script src="config.js"></script>

<script>
let currentUser = null;
let allRows = [];

// تحميل بيانات المستخدم
function loadUser() {
    currentUser = getCurrentUser();
    if (!currentUser) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("userInfo").textContent =
        currentUser.name + " (" + currentUser.role + ")";
}

// تحميل الطلبات من Google Sheets
function loadRequests() {
    fetch(API_URL + "?action=getRequests")
        .then(res => res.json())
        .then(data => {
            allRows = data;
            renderTable(data);
        })
        .catch(err => {
            console.error(err);
            alert("Error loading requests.");
        });
}

// عرض البيانات في الجدول
function renderTable(data) {
    const tbody = document.querySelector("#partsTable tbody");
    tbody.innerHTML = "";

    data.forEach(r => {
        // requester يشوف فقط طلباته
        if (currentUser.role === "requester" && r.requesterEmail !== currentUser.email) {
            return;
        }

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${r.po}</td>
            <td>${r.part}</td>
            <td>${r.qty}</td>
            <td><span class="status ${r.status.replace(' ', '')}">${r.status}</span></td>
            <td>${r.date}</td>
            <td>${r.requesterName}</td>
            <td><a href="request-details.html?id=${encodeURIComponent(r.id)}" class="link">View</a></td>
        `;

        tbody.appendChild(tr);
    });
}

// البحث داخل الجدول
function filterTable() {
    const q = document.getElementById("searchBox").value.toLowerCase();
    const filtered = allRows.filter(r =>
        (r.po || "").toLowerCase().includes(q) ||
        (r.part || "").toLowerCase().includes(q) ||
        (r.requesterName || "").toLowerCase().includes(q) ||
        (r.status || "").toLowerCase().includes(q)
    );
    renderTable(filtered);
}

loadUser();
loadRequests();
</script>

</body>
</html>
