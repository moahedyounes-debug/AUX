<!DOCTYPE html>
<html>
  <body style="font-family:Arial;padding:40px">

    <h2>Test Login Code</h2>

    <label>Email:</label>
    <input id="email" type="email" style="padding:8px;width:250px"><br><br>

    <button onclick="sendCode()" style="padding:10px 20px">Send Code</button>

    <p id="result"></p>

    <script>
      function sendCode() {
        const email = document.getElementById("email").value;

        google.script.run
          .withSuccessHandler(res => {
            document.getElementById("result").innerHTML = 
              "<b>Code sent successfully!</b>";
          })
          .withFailureHandler(err => {
            document.getElementById("result").innerHTML = 
              "<b style='color:red'>Error: " + err.message + "</b>";
          })
          .sendLoginCodeFromUI(email);
      }
    </script>

  </body>
</html>
